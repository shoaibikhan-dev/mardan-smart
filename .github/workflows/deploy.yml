name: Cloud-Native Deployment Pipeline
on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERUSERNAME }}
          password: ${{ secrets.DOCKERPASSWORD }}

      - name: Build Backend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERUSERNAME }}/mardan-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKERUSERNAME }}/mardan-backend:latest ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:${{ github.sha }} \
            -t ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:latest ./frontend

      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME }}/mardan-backend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          skip-files: /usr/local/lib/node_modules/npm/node_modules

      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          skip-files: /usr/local/lib/node_modules/npm/node_modules

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKERUSERNAME }}/mardan-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERUSERNAME }}/mardan-backend:latest

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:latest

      - name: Update Image Tags in Kubernetes YAML
        run: |
          sed -i "s|${{ secrets.DOCKERUSERNAME }}/mardan-backend[^\"]*|${{ secrets.DOCKERUSERNAME }}/mardan-backend:${{ github.sha }}|g" k3s/deployments/backend-deployment.yaml
          sed -i "s|${{ secrets.DOCKERUSERNAME }}/mardan-frontend[^\"]*|${{ secrets.DOCKERUSERNAME }}/mardan-frontend:${{ github.sha }}|g" k3s/deployments/frontend-deployment.yaml
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add k3s/deployments/backend-deployment.yaml
          git add k3s/deployments/frontend-deployment.yaml
          git commit -m "ci: update images to ${{ github.sha }}"
          git push
      - name: Sign Backend Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            ${{ secrets.DOCKERUSERNAME }}/mardan-backend:${{ github.sha }}

      - name: Sign Frontend Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            ${{ secrets.DOCKERUSERNAME }}/mardan-frontend:${{ github.sha }}
