name: Cloud-Native Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Login to Container Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mardan-backend:latest -t ${{ secrets.DOCKER_USERNAME }}/mardan-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/mardan-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mardan-backend:${{ github.sha }}

      - name: Build & Push Frontend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mardan-frontend:latest -t ${{ secrets.DOCKER_USERNAME }}/mardan-frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/mardan-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mardan-frontend:${{ github.sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Kubeconfig for K3s
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply Kubernetes Manifests (Zero-Downtime Rollout)
        run: |
          # Ensure kustomize is applied
          kubectl apply -k k3s/
          
          # Force deployment restart to pull newest images
          kubectl set image deployment/backend backend=${{ secrets.DOCKER_USERNAME }}/mardan-backend:${{ github.sha }} -n mardan-smart-city
          kubectl set image deployment/frontend frontend=${{ secrets.DOCKER_USERNAME }}/mardan-frontend:${{ github.sha }} -n mardan-smart-city
