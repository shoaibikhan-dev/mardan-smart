apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mardan-smart-city
  labels:
    app: backend
    tier: backend
    version: "1.0"
spec:
  replicas: 4
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime: never kill a pod before new one is ready
  template:
    metadata:
      labels:
        app: backend
        tier: backend
    spec:
      serviceAccountName: backend-sa
      securityContext:
        fsGroup: 1001
      containers:
      - name: backend
        image: shoaibikhandev/mardan-backend:229d8a7c13ee0cc894b40cef9b1d6a2b9f47a23f
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        # Startup: give slow-starting container time before liveness kicks in
        startupProbe:
          httpGet:
            path: /api/health
            port: 5000
          failureThreshold: 30
          periodSeconds: 5
        # Readiness: only send traffic when the app is fully ready
        readinessProbe:
          httpGet:
            path: /api/health/ready
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 5
          timeoutSeconds: 5
          successThreshold: 1
        # Liveness: restart container if it hangs but doesn't crash
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 5
          timeoutSeconds: 10
        volumeMounts:
        - name: uploads-volume
          mountPath: /usr/src/app/uploads
      volumes:
      - name: uploads-volume
        persistentVolumeClaim:
          claimName: uploads-pvc
