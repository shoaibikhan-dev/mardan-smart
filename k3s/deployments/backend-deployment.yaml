apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mardan-smart-city
  labels:
    app: backend
    tier: backend
    version: "1.0"
spec:
  replicas: 4
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime: never kill a pod before new one is ready
  template:
    metadata:
      labels:
        app: backend
        tier: backend
    spec:
      securityContext:
        fsGroup: 1001
      containers:
      - name: backend
        image: shoaibikhandev/mardan-backend:37379defc9f4df27aa5ea9317b60d94425202eb6
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        # Readiness: only send traffic when the app is fully ready
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        # Liveness: restart container if it hangs but doesn't crash
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
          timeoutSeconds: 5
        volumeMounts:
        - name: uploads-volume
          mountPath: /usr/src/app/uploads
      volumes:
      - name: uploads-volume
        emptyDir: {}
