apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: mardan-smart-city
data:
  pgbouncer.ini: |
    [databases]
    mardan_smart_city = host=postgres.mardan-smart-city.svc.cluster.local port=5432 dbname=mardan_smart_city

    [pgbouncer]
    listen_port = 5432
    listen_addr = 0.0.0.0
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = 2000
    default_pool_size = 50
    min_pool_size = 10
    reserve_pool_size = 25
    reserve_pool_timeout = 3
    max_db_connections = 200
    idle_transaction_timeout = 30
    server_idle_timeout = 600
    log_connections = 0
    log_disconnections = 0
    log_pooler_errors = 1
    stats_period = 60
    ignore_startup_parameters = extra_float_digits
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: mardan-smart-city
  labels:
    app: pgbouncer
    tier: database
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
        tier: database
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: pgbouncer
        image: pgbouncer/pgbouncer:latest
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 6432
          name: postgres
        env:
        - name: DATABASES_HOST
          value: postgres.mardan-smart-city.svc.cluster.local
        - name: DATABASES_PORT
          value: "5432"
        - name: DATABASES_DBNAME
          value: mardan_smart_city
        - name: DATABASES_USER
          value: postgres
        - name: DATABASES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: POSTGRES_PASSWORD
        - name: PGBOUNCER_POOL_MODE
          value: transaction
        - name: PGBOUNCER_MAX_CLIENT_CONN
          value: "2000"
        - name: PGBOUNCER_DEFAULT_POOL_SIZE
          value: "50"
        - name: PGBOUNCER_MIN_POOL_SIZE
          value: "10"
        - name: PGBOUNCER_RESERVE_POOL_SIZE
          value: "25"
        - name: PGBOUNCER_MAX_DB_CONNECTIONS
          value: "200"
        - name: PGBOUNCER_IGNORE_STARTUP_PARAMETERS
          value: extra_float_digits
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          tcpSocket:
            port: 6432
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 6432
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: mardan-smart-city
  labels:
    app: pgbouncer
spec:
  selector:
    app: pgbouncer
  ports:
  - port: 5432
    targetPort: 6432
    name: postgres
  type: ClusterIP
