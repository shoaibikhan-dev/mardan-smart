apiVersion: v1
kind: LimitRange
metadata:
  name: mardan-limitrange
  namespace: mardan-smart-city
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "2"
      memory: "2Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: mardan-quota
  namespace: mardan-smart-city
spec:
  hard:
    requests.cpu: "16"
    requests.memory: "8Gi"
    limits.cpu: "32"
    limits.memory: "16Gi"
    pods: "50"
