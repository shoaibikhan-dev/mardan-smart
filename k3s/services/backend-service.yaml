apiVersion: v1
kind: Service
metadata:
  name: mardan-backend
  namespace: mardan-smart-city
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/api/metrics"
    prometheus.io/port: "5000"
spec:
  type: NodePort
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 31724
