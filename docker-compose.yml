version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mardan-postgres
    restart: always
    environment:
      POSTGRES_DB: mardan_smart_city
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mardan_password_123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mardan_smart_city"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mardan-network

  redis:
    image: redis:7-alpine
    container_name: mardan-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mardan-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mardan-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mardan_smart_city
      DB_USER: postgres
      DB_PASSWORD: mardan_password_123
      JWT_SECRET: mardan_smart_city_super_secret_jwt_key_2024
      JWT_EXPIRE: 7d
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mardan-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mardan-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mardan-network

  prometheus:
    image: prom/prometheus:latest
    container_name: mardan-prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - mardan-network

  grafana:
    image: grafana/grafana:latest
    container_name: mardan-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=mardan_admin_dashboard
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mardan-network

volumes:
  pgdata:
    driver: local
  grafana_data:
    driver: local

networks:
  mardan-network:
    driver: bridge
